<svg width="560" height="240" viewBox="0 0 560 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ccx — multi-account orchestrator for Claude Code">
  <defs>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- terminal card (dark panel reads well on light AND dark GitHub themes) -->
  <rect x="8" y="8" width="544" height="224" rx="18" fill="#16161e"/>
  <rect x="8.5" y="8.5" width="543" height="223" rx="17.5" stroke="#3b3b54" stroke-opacity="0.8"/>

  <!-- title bar -->
  <circle cx="34" cy="34" r="6" fill="#ff5f57"/>
  <circle cx="54" cy="34" r="6" fill="#febc2e"/>
  <circle cx="74" cy="34" r="6" fill="#28c840"/>
  <text x="530" y="39" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#565f89">~ zsh</text>

  <!-- wordmark -->
  <text x="40" y="106" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="64" font-weight="700" fill="url(#glow)">ccx</text>
  <!-- lightning bolt -->
  <path d="M198 52 L172 96 h20 L178 132 L216 82 h-22 L210 52 Z" fill="url(#bolt)"/>
  <text x="238" y="84" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" fill="#a9b1d6">one claude,</text>
  <text x="238" y="106" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" fill="#a9b1d6">every account you've got</text>

  <!-- gauge rows: three accounts -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">
    <text x="40" y="152" fill="#c0caf5">⚡work</text>
    <rect x="130" y="141" width="300" height="12" rx="6" fill="#24283b"/>
    <rect x="130" y="141" width="96" height="12" rx="6" fill="#9ece6a"/>
    <text x="444" y="152" fill="#565f89">5h32%·2h11m</text>

    <text x="40" y="180" fill="#c0caf5"> personal</text>
    <rect x="130" y="169" width="300" height="12" rx="6" fill="#24283b"/>
    <rect x="130" y="169" width="222" height="12" rx="6" fill="#e0af68"/>
    <text x="444" y="180" fill="#565f89">wk74%·1d9h</text>

    <text x="40" y="208" fill="#c0caf5"> side</text>
    <rect x="130" y="197" width="300" height="12" rx="6" fill="#24283b"/>
    <rect x="130" y="197" width="285" height="12" rx="6" fill="#f7768e"/>
    <text x="444" y="208" fill="#565f89">F95%·41m🔥</text>
  </g>
</svg>
